<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-size: larger;
        color: burlywood;
    }
</style>
<body>
    <h1>List-Fruits</h1>
    <ul id="lst-fruits"></ul>
    
</body>
</html>
<script>
    const fruits = [ "appple" , "banana" , "orange" , "coconut" , "mengo" ];

    const list = document.getElementById("lst-fruits");
    for (let i = 0; i < fruits.length; i++) {
        let li = document.createElement("li");
        li.innerText = fruits[i];
        list.append(li);
    }


</script>
