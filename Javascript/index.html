<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☕ Coffee Shop Pro UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Body & Dark Mode */
body { background:#f8f9fa; font-family:'Poppins', sans-serif; }
body.dark { background:#121212; color:white; }
.dark .card { background:#1e1e1e; color:white; }

/* Hero Section */
.hero { background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1600&q=80') no-repeat center center; background-size: cover; height:60vh; display:flex; align-items:center; justify-content:center; color:white; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
.hero h1 { font-size:3rem; font-weight:700; }
.hero button { margin-top:1rem; }

/* Product Cards */
.card img { height:180px; object-fit:cover; border-radius:6px; transition:0.3s; }
.card:hover { transform: scale(1.05); }

/* Admin Panel */
#adminPanel input { border-radius:0.25rem; }

/* Toast */
.toast { opacity:1; }

/* Category Tabs */
.nav-tabs .nav-link.active { background-color:#ffc107; color:#000; font-weight:600; }

/* Cart Modal */
#cartModal .modal-content { border-radius:10px; padding:20px; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="#">☕ Coffee Shop</a>
    <div class="d-flex align-items-center">
      <span class="text-white me-2" id="userInfo">Guest</span>
      <button onclick="toggleDark()" class="btn btn-secondary btn-sm me-2">🌙</button>
      <button onclick="logout()" class="btn btn-danger btn-sm me-3">Logout</button>
      <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#cartModal">
        🛒 Cart (<span id="cartCount">0</span>)
      </button>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero text-center">
  <div>
    <h1>Welcome to Coffee Heaven ☕</h1>
    <button class="btn btn-warning btn-lg" onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>

<!-- Admin Panel -->
<div class="container my-4" id="adminPanel" style="display:none;">
  <h5 class="mb-2">👑 Admin Panel</h5>
  <div class="row g-2">
    <div class="col-md-3"><input id="pName" class="form-control" placeholder="Product Name"></div>
    <div class="col-md-2"><input id="pPrice" type="number" class="form-control" placeholder="Price"></div>
    <div class="col-md-4"><input id="pImg" class="form-control" placeholder="Image URL"></div>
    <div class="col-md-3"><button onclick="addProduct()" class="btn btn-success w-100">Add Product</button></div>
  </div>
</div>

<!-- Category Tabs -->
<div class="container mt-3">
  <ul class="nav nav-tabs" id="categoryTabs">
    <li class="nav-item"><a class="nav-link active" onclick="filterCategory('All')">All</a></li>
    <li class="nav-item"><a class="nav-link" onclick="filterCategory('Coffee')">Coffee</a></li>
    <li class="nav-item"><a class="nav-link" onclick="filterCategory('Tea')">Tea</a></li>
    <li class="nav-item"><a class="nav-link" onclick="filterCategory('Other')">Other</a></li>
  </ul>
</div>

<!-- Product Cards -->
<div class="container my-4">
  <div class="row g-4" id="cardContainer"></div>
</div>

<!-- Cart Modal -->
<div class="modal fade" id="cartModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">
      <h5>🛒 Your Cart</h5>
      <div id="cartItems"></div>
      <h6 class="mt-2">Total: <span id="cartTotal">$0</span></h6>
      <button class="btn btn-success w-100 mt-2" onclick="checkout()">Checkout</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">
      <h5 class="text-center mb-3">Login</h5>
      <input id="username" class="form-control mb-2" placeholder="Username">
      <input id="password" type="password" class="form-control mb-2" placeholder="Password">
      <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
      <p id="loginError" class="text-danger text-center"></p>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3">
  <div id="toastBox" class="toast bg-success text-white">
    <div class="toast-body" id="toastMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ===== Users =====
let users = [
  { username:"admin", password:"123", role:"Admin" },
  { username:"user", password:"123", role:"User" }
];
let currentUser = JSON.parse(localStorage.getItem("session"));

// ===== Products =====
let products = JSON.parse(localStorage.getItem("products")) || [
  {id:1,name:"Coffee",price:2.5,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",category:"Coffee"},
  {id:2,name:"Latte",price:3.5,img:"https://upload.wikimedia.org/wikipedia/commons/d/d8/Caffe_Latte_at_Pulse_Cafe.jpg",category:"Coffee"},
  {id:3,name:"Milk Tea",price:3.0,img:"https://worldlytreat.com/wp-content/uploads/2024/04/Tiger-milk-tea-3.jpg",category:"Tea"},
  {id:4,name:"Green Tea",price:2.0,img:"https://cdn.shopify.com/s/files/1/0655/8279/2933/files/Macha_latte-1_480x480.webp?v=1697619272",category:"Tea"}
];

// ===== Cart =====
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ===== Login =====
function login(){
  let u=username.value.trim(), p=password.value.trim();
  let found=users.find(x=>x.username===u && x.password===p);
  if(found){ localStorage.setItem("session",JSON.stringify(found)); location.reload(); }
  else loginError.innerText="Wrong username or password!";
}
function logout(){ localStorage.removeItem("session"); location.reload(); }

// ===== Admin Panel =====
function checkAdmin(){ if(currentUser?.role==="Admin") adminPanel.style.display="block"; }

// ===== Display Products =====
function displayProducts(list=products){
  cardContainer.innerHTML="";
  list.forEach(p=>{
    cardContainer.innerHTML += `
    <div class="col-6 col-md-3">
      <div class="card shadow-sm">
        <img src="${p.img}" class="card-img-top">
        <div class="card-body text-center">
          <h6>${p.name}</h6>
          <p>$${p.price}</p>
          <button class="btn btn-primary btn-sm w-100 mb-1" onclick="addToCart(${p.id})">Add to Cart</button>
          ${currentUser?.role==="Admin"?`
          <button class="btn btn-warning btn-sm w-100 mb-1" onclick="editProduct(${p.id})">Edit</button>
          <button class="btn btn-danger btn-sm w-100" onclick="deleteProduct(${p.id})">Delete</button>`:""}
        </div>
      </div>
    </div>`;
  });
}

// ===== Admin Functions =====
function addProduct(){
  let name=pName.value.trim(), price=parseFloat(pPrice.value), img=pImg.value.trim();
  if(!name || !price || !img) return alert("Fill all fields!");
  products.push({id:Date.now(), name, price, img, category:"Other"});
  saveProducts();
}
function editProduct(id){
  let p=products.find(x=>x.id===id);
  let n=prompt("Edit name:",p.name), pr=prompt("Edit price:",p.price), i=prompt("Edit image URL:",p.img);
  if(!n||!pr||!i) return alert("Invalid input!");
  p.name=n; p.price=parseFloat(pr); p.img=i;
  saveProducts();
}
function deleteProduct(id){ if(confirm("Delete this product?")){ products=products.filter(p=>p.id!==id); saveProducts(); } }
function saveProducts(){ localStorage.setItem("products",JSON.stringify(products)); displayProducts(); }

// ===== Cart Functions =====
function addToCart(id){
  let item=products.find(p=>p.id===id);
  if(cart.find(i=>i.id===id)){ showToast("Already in cart!"); return; }
  cart.push(item); saveCart(); showToast("Added to cart!");
}
function saveCart(){ localStorage.setItem("cart",JSON.stringify(cart)); updateCart(); }
function updateCart(){ 
  cartItems.innerHTML=""; let total=0;
  cart.forEach((i,index)=>{ total+=i.price; cartItems.innerHTML+=`${i.name} - $${i.price} <button onclick="removeItem(${index})">❌</button><br>`; });
  cartTotal.innerText="$"+total.toFixed(2); cartCount.innerText=cart.length;
}
function removeItem(i){ cart.splice(i,1); saveCart(); }
function checkout(){ if(cart.length===0){ alert("Cart empty!"); return;} alert("Order successful! 🎉"); cart=[]; saveCart(); }

// ===== Category Filter =====
function filterCategory(cat){
  Array.from(categoryTabs.getElementsByTagName("a")).forEach(a=>a.classList.remove("active"));
  event.target.classList.add("active");
  if(cat==="All") displayProducts(products);
  else displayProducts(products.filter(p=>p.category===cat));
}

// ===== Search =====
function scrollToProducts(){ window.scrollTo({top:cardContainer.offsetTop-50,behavior:'smooth'}); }

// ===== Dark Mode ===== 
function toggleDark(){ document.body.classList.toggle("dark"); }

// ===== Toast =====
function showToast(msg){ toastMsg.innerText=msg; new bootstrap.Toast(toastBox).show(); }

// ===== Init =====
window.onload=()=>{
  if(!currentUser){ new bootstrap.Modal(loginModal).show(); }
  else userInfo.innerText=currentUser.username+" ("+currentUser.role+")";
  checkAdmin(); displayProducts(); updateCart();
};
</script>
</body>
</html>
