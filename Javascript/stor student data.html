<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Form -->
    <div class="card p-4 shadow-sm">
        <h4 class="mb-3">Student Form</h4>

        <input type="text" id="fname" class="form-control mb-2" placeholder="First Name">
        <input type="text" id="lname" class="form-control mb-2" placeholder="Last Name">

        <select id="country" class="form-control mb-2">
            <option>Cambodia</option>
            <option>USA</option>
            <option>Japan</option>
        </select>

        <input type="number" id="score" class="form-control mb-3" placeholder="Score">

        <button class="btn btn-success" onclick="addStudent()">Add</button>
        <button class="btn btn-primary" onclick="showStudents()">View</button>
        <button class="btn btn-warning" onclick="searchStudent()">Search</button>
    </div>
    <div class="card mt-4 p-3 shadow-sm">
        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Country</th>
                    <th>Score</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>
</body>
</html>
<script src="./stordatastudent.js"></script>
