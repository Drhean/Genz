<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, rgb(247, 161, 175), rgb(98, 242, 98));
    }
    .calculator {
        width: 350px;
        border-radius: 20px;
    }
    #display {
        font-size: 28px;
        height: 60px;
        border-radius: 10px;
    }
    button {
        height: 55px;
        font-size: 18px;
        border-radius: 12px !important;
    }
</style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card calculator shadow-lg p-3">
    <h4 class="text-center text-white mb-3">Pro Calculator</h4>

    <input type="text" id="display" class="form-control text-end mb-3" readonly>

    <div class="row g-2">

        <div class="col-3"><button class="btn btn-secondary" onclick="clearDisplay()">C</button></div>
        <div class="col-3"><button class="btn btn-secondary" onclick="deleteLast()">⌫</button></div>
        <div class="col-3"><button class="btn btn-warning" onclick="append('/')">/</button></div>
        <div class="col-3"><button class="btn btn-warning" onclick="append('*')">*</button></div>

        <div class="col-3"><button class="btn btn-light" onclick="append('7')">7</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('8')">8</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('9')">9</button></div>
        <div class="col-3"><button class="btn btn-warning" onclick="append('-')">-</button></div>

        <div class="col-3"><button class="btn btn-light" onclick="append('4')">4</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('5')">5</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('6')">6</button></div>
        <div class="col-3"><button class="btn btn-warning" onclick="append('+')">+</button></div>

        <div class="col-3"><button class="btn btn-light" onclick="append('1')">1</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('2')">2</button></div>
        <div class="col-3"><button class="btn btn-light" onclick="append('3')">3</button></div>
        <div class="col-3"><button class="btn btn-success" onclick="calculate()">=</button></div>

        <div class="col-6"><button class="btn btn-light" onclick="append('0')">0</button></div>
        <div class="col-6"><button class="btn btn-light" onclick="append('.')">.</button></div>

    </div>
</div>
</body>
</html>
<script src="./dom2.js"></script>
