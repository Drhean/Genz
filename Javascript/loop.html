<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-content: center;
            padding: 20px;



        }
        .box{
            width: 350px;
            height: 350px;
            border-radius: 8px;
            border: solid 3px black;
            font-size: 30px;
            text-align: center;
            place-content: center;

        }
    </style>
   

    
</body>
</html>
<script>
   let boxnumber = parseInt(prompt("enter num of box :"))
    for ( i= 1; i<= boxnumber ; i++){
        document.write(`
        <div class="box">
            box ${i}
        </div>
        `);
    }
</script>
