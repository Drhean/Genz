<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Restaurant Ordering System - 50 Foods</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-4">
  <h2 class="text-center mb-4">🍔 Restaurant Ordering System (50 Foods)</h2>

  <div class="row">

    <!-- MENU -->
    <div class="col-md-8">
      <div class="row" id="menuList"></div>
    </div>

    <!-- CART -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h4>🛒 Order List</h4>
          <ul id="cart" class="list-group mb-3"></ul>
          <h5>Total: $<span id="total">0</span></h5>
          <button class="btn btn-dark w-100" onclick="clearCart()">Clear Order</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ===== FOOD DATA (50 ITEMS) =====
const foods = [
{name:"Burger", price:5},{name:"Pizza", price:8},{name:"Fried Chicken", price:6},{name:"Hotdog", price:4},{name:"Sandwich", price:3},
{name:"Steak", price:12},{name:"Spaghetti", price:7},{name:"Noodles", price:4},{name:"Fried Rice", price:5},{name:"Sushi", price:10},
{name:"Taco", price:3},{name:"Burrito", price:6},{name:"Salad", price:4},{name:"Soup", price:3},{name:"Pancake", price:5},
{name:"Waffle", price:5},{name:"Ice Cream", price:2},{name:"Donut", price:2},{name:"Cake", price:4},{name:"Cookie", price:1},
{name:"Milk Tea", price:3},{name:"Coffee", price:2},{name:"Latte", price:3},{name:"Cappuccino", price:3},{name:"Smoothie", price:4},
{name:"Orange Juice", price:3},{name:"Apple Juice", price:3},{name:"Lemon Tea", price:2},{name:"Cola", price:1},{name:"Water", price:1},
{name:"Spring Roll", price:3},{name:"Dumpling", price:4},{name:"BBQ Pork", price:7},{name:"Roast Duck", price:9},{name:"Grilled Fish", price:8},
{name:"Shrimp", price:9},{name:"Crab", price:11},{name:"Lobster", price:15},{name:"Omelette", price:3},{name:"French Fries", price:2},
{name:"Chicken Wings", price:6},{name:"Cheese Ball", price:4},{name:"Nachos", price:5},{name:"Popcorn", price:3},{name:"Fried Banana", price:2},
{name:"Chocolate", price:2},{name:"Brownie", price:3},{name:"Cupcake", price:2},{name:"Macaron", price:4},{name:"Cheesecake", price:5}
];

// ===== GENERATE MENU CARDS =====
const menu = document.getElementById("menuList");

foods.forEach(food => {
  menu.innerHTML += `
    <div class="col-md-4 col-sm-6 mb-4">
      <div class="card h-100 shadow-sm text-center">
        <div class="card-body">
          <h5 class="card-title">${food.name}</h5>
          <p class="card-text">$${food.price}</p>
          <button class="btn btn-primary" onclick="addOrder('${food.name}',${food.price})">Order</button>
        </div>
      </div>
    </div>
  `;
});

// ===== CART FUNCTIONALITY =====
let total = 0;

function addOrder(name, price){
  const cart = document.getElementById("cart");
  const li = document.createElement("li");
  li.className = "list-group-item";
  li.innerText = `${name} - $${price}`;
  cart.appendChild(li);
  total += price;
  document.getElementById("total").innerText = total;
}

function clearCart(){
  document.getElementById("cart").innerHTML = "";
  total = 0;
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
