<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f0f2f5;
    font-family: Arial, Helvetica, sans-serif;
}

.signup-card{
    max-width:520px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.label-title{
    font-weight:600;
    font-size:14px;
}

.info-icon{
    background:#ccd0d5;
    color:white;
    border-radius:50%;
    padding:2px 7px;
    font-size:12px;
    margin-left:5px;
}

.submit-btn{
    background:#1877f2;
    color:white;
    font-weight:bold;
    border-radius:30px;
    padding:12px;
}

.submit-btn:hover{
    background:#166fe5;
}
</style>
</head>

<body>

<div class="container py-5">

<div class="signup-card">

<h4 class="fw-bold mb-1">Get started on Facebook</h4>
<p class="text-muted small">
Create an account to connect with friends, family and communities.
</p>

<form>

<img style="width: 80px; height: 80px;" class="mx-auto d-grid" src="https://s3-alpha.figma.com/hub/file/5388452724/888ad143-5a02-49cc-8642-f94240b67589-cover.png">

<label class="label-title">Name</label>
<div class="row g-2 mb-3">
    <div class="col">
        <input class="form-control" placeholder="First name">
    </div>
    <div class="col">
        <input class="form-control" placeholder="Last name">
    </div>
</div>

<label class="label-title">
Birthday <span class="info-icon">?</span>
</label>

<div class="row g-2 mb-3">

<div class="col">
<select class="form-select">
<option selected>Day</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option><option>11</option><option>12</option>
<option>13</option><option>14</option><option>15</option>
<option>16</option><option>17</option><option>18</option>
<option>19</option><option>20</option><option>21</option>
<option>22</option><option>23</option><option>24</option>
<option>25</option><option>26</option><option>27</option>
<option>28</option><option>29</option><option>30</option>
<option>31</option>
</select>
</div>

<div class="col">
<select class="form-select">
<option selected>Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>
</div>

<div class="col">
<select class="form-select">
<option selected>Year</option>
<option>2026</option>
<option>2025</option>
<option>2024</option>
<option>2023</option>
<option>2022</option>
<option>2021</option>
<option>2020</option>
</select>
</div>

</div>

<label class="label-title">Gender</label>
<select class="form-select mb-3">
<option>Select your gender</option>
<option>Female</option>
<option>Male</option>
<option>Custom</option>
</select>

<label class="label-title">Mobile number or email</label>
<input class="form-control mb-3" placeholder="Mobile number or email">

<p class="text-muted small">
You may receive notifications from us.
</p>

<label class="label-title">Password</label>
<input type="password" class="form-control mb-3" placeholder="Password">

<p class="text-muted small">
By tapping Submit, you agree to our Terms, Privacy Policy and Cookies Policy.
</p>

<div class="d-grid">
<button class="btn submit-btn">Submit</button>
</div>

</form>

</div>
</div>

</body>
</html>
