<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="w-100 h-100 p-5">
    <h2 class="text-center">Registration form</h2>
    <form style="width: 450px;" class=" h-auto mt-2 shadow-lg mx-auto p-4  mt-4" action="">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control mt-2" id="emailConfirm" placeholder="Confirm Email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control mt-2" id="passwordConfirm" placeholder="Confirm Password" required>
        </div>
        <div class="mb-3">
            <label for="gender" >Gender</label>
            <select class="form-select mt-2" id="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</body>
</html>
