<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="w-100 h-100 p-5">
    
    <form style="width: 450px;" class="h-auto mt-2 shadow-lg mx-auto p-4 mt-4 " action="">
    <img style="width: 80px ;height: 80px;" class="mx-auto d-block" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmfgEsISgcMna9mdI-t_XY7o-WkAI0ctitvg&s" alt="">
    <h2 class="text-center">Welcome User</h2>
    <p class="text-center">Please fill out the form below:</p>
        
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control mt-2" id="emailConfirm" placeholder="email@example.com" required>

        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control mt-2" id="passwordConfirm" placeholder="Enter your Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
        <p class="text-center mt-3">Don't have an account? <a href="#">Sign Up</a></p>

    </form>
</body>
</html>
