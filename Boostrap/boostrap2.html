<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
    background:#bfbfbf;
}

.profile-card{
    width:350px;
    border-radius:25px;
    overflow:hidden;
    background:white;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    text-align:center;
}
.card-header-custom{
    height:150px;
    background: linear-gradient(135deg,#cf1931,#b30000);
    border-radius: 20px;
}
.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
    margin-top:-60px;
}
.profile-card h4{
    font-weight:700;
    margin-top:15px;
}
.role{
    color:#ff2aa3;
    position:relative;
    display:inline-block;
    margin-bottom:20px;
}

.role::after{
    content:"";
    width:100px;
    height:3px;
    background:#4c00ff;
    position:absolute;
    bottom:-5px;
    left:50%;
    transform:translateX(-50%);
}

.social-icons a{
    color:#b30000;
    margin:0 10px;
    font-size:18px;
    transition:0.3s;
    cursor: pointer;
}

.social-icons a:hover{
    color:#ff1e3c;
}
</style>

</head>
<body class="d-flex justify-content-center align-items-center vh-100">

<div class="profile-card">
    <div class="card-header-custom"></div>

    <img src="https://i.pinimg.com/1200x/1c/02/98/1c02987700b1d55aaa2b2fca883ae780.jpg" class="profile-img" alt="Profile">

    <div class="p-4">
        <h4>Ne Sokhean</h4>
        <div class="role">Product Design</div>

        <p class="text-muted small">
            I choose the product design track because I love solving visual problems using UI/UX designs
        </p>

        <div class="social-icons mt-3">
            <a href="#"><i class="bi bi-instagram">IG</i></a>
            <a href="#"><i class="bi bi-twitter">Twitter</i></a>
            <a href="#"><i class="bi bi-facebook">FaceBook</i></a>
        </div>
    </div>
</div>

</body>
</html>
