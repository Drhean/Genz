<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Cards</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        margin: 0;
        padding: 40px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
    }

    .card-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
    }

    .card-content {
        padding: 20px;
        flex-grow: 1;
    }

    .card-title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .card-text {
        color: #555;
        line-height: 1.5;
    }

    .card-footer {
        padding: 20px;
    }

    .btn {
        display: block;
        text-align: center;
        background: #1e66dc;
        color: #fff;
        padding: 12px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.2s;
    }

    .btn:hover {
        background: #1553b7;
    }
</style>
</head>

<body>
<div  class="card-container">
<h2>Our Services fake api stor </h2>


</div>

</body>
</html>
<Script src="./apidata.js"></Script>
