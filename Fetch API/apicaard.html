<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Card</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 300px;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        overflow: hidden;
        text-align: center;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }

    .card-body {
        padding: 20px;
    }

    .card h2 {
        margin: 10px 0;
        font-size: 22px;
        color: #333;
    }

    .info {
        color: #666;
        margin: 5px 0;
    }

    .badge {
        display: inline-block;
        padding: 5px 12px;
        background: #007bff;
        color: #fff;
        border-radius: 20px;
        font-size: 12px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div id="display" class="card">
    
</div>

</body>
</html>
<script src="./api.js"></script>
