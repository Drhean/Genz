<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel UI</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

/* Grid */
.container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

/* Card */
.card{
  position:relative;
  height:380px;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform: scale(1.03);
}

/* Image */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Overlay */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* Text */
.title{
  font-size:18px;
  font-weight:bold;
}

.desc{
  font-size:13px;
  opacity:0.85;
  margin-top:5px;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:6px 12px;
  background:#22c55e;
  border-radius:6px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>🌍 Travel Destinations</h1>

<div id="display" class="container">

</div>

</body>
</html>
<script src="./apicard.js"></script>
